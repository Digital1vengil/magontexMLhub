name: Deploy Frontend (Pages)

# PR a master  -> deploy de PREVIEW (URL única, detrás de Cloudflare Access).
# Push a master -> deploy a PRODUCCIÓN (branch de producción de Pages = main).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test          # gate: tests puros (colors.test.ts) — si fallan, no se buildea ni deploya
      - run: npm run build

      # Push a master -> producción.
      - name: Deploy producción
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cc19a8c6e5c0d9da7b88f17f5a6ec470
          command: pages deploy dist --project-name=parkahub --branch=main

      # PR -> preview con URL única (pr-<n>.parkahub.pages.dev), cubierta por la app de Access.
      - name: Deploy preview (PR)
        id: preview
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cc19a8c6e5c0d9da7b88f17f5a6ec470
          command: pages deploy dist --project-name=parkahub --branch=pr-${{ github.event.number }}

      - name: Comentar la URL de preview en el PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.preview.outputs.deployment-url }}";
            if (url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🔎 **Preview desplegada:** ${url}\n\nLogueate con tu mail \`@magontex.com.ar\`. Nota: los cambios de **backend** no se ven acá — el preview pega al Worker de producción.`
              });
            }
